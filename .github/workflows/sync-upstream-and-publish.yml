name: Sync upstream and publish Docker image

on:
  workflow_dispatch:
  schedule:
    # 台灣時間每天 05:23 / 17:23
    # GitHub cron 使用 UTC
    - cron: "23 21,9 * * *"
  push:
    branches:
      - master
      - main
    paths-ignore:
      - "README.md"
      - "docs/**"

permissions:
  contents: write
  packages: write

concurrency:
  group: osiris-sync-build
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: valorvie/osiris
  UPSTREAM_REPO: https://github.com/simplifaisoul/osiris.git
  UPSTREAM_BRANCH: master

jobs:
  sync-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync from upstream
        id: sync
        shell: bash
        run: |
          set -euo pipefail

          FORK_BRANCH="${GITHUB_REF_NAME}"

          git remote add upstream "$UPSTREAM_REPO" || true
          git fetch upstream "$UPSTREAM_BRANCH"

          BEFORE_SHA="$(git rev-parse HEAD)"
          UPSTREAM_SHA="$(git rev-parse "upstream/$UPSTREAM_BRANCH")"
          UPSTREAM_SHORT="$(git rev-parse --short=12 "upstream/$UPSTREAM_BRANCH")"

          echo "before_sha=$BEFORE_SHA" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          echo "upstream_short=$UPSTREAM_SHORT" >> "$GITHUB_OUTPUT"

          # 如果 upstream 已經包含在 fork 目前分支內，代表不用同步。
          if git merge-base --is-ancestor "upstream/$UPSTREAM_BRANCH" HEAD; then
            echo "No upstream changes."
            echo "sync_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Merging upstream/$UPSTREAM_BRANCH into $FORK_BRANCH..."
            git merge --no-edit "upstream/$UPSTREAM_BRANCH"
            AFTER_SHA="$(git rev-parse HEAD)"

            echo "after_sha=$AFTER_SHA" >> "$GITHUB_OUTPUT"
            echo "sync_changed=true" >> "$GITHUB_OUTPUT"

            git push origin "HEAD:$FORK_BRANCH"
          fi

      - name: Decide whether to build
        id: decide
        shell: bash
        run: |
          set -euo pipefail

          BUILD_NEEDED="false"

          # 手動觸發：一定 build
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BUILD_NEEDED="true"
          fi

          # 一般 push：一定 build
          if [[ "${{ github.event_name }}" == "push" ]]; then
            BUILD_NEEDED="true"
          fi

          # 排程：只有 upstream 有變更才 build
          if [[ "${{ github.event_name }}" == "schedule" && "${{ steps.sync.outputs.sync_changed }}" == "true" ]]; then
            BUILD_NEEDED="true"
          fi

          echo "build_needed=$BUILD_NEEDED" >> "$GITHUB_OUTPUT"
          echo "Build needed: $BUILD_NEEDED"

      - name: Set up Docker Buildx
        if: steps.decide.outputs.build_needed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.decide.outputs.build_needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.decide.outputs.build_needed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:upstream-${{ steps.sync.outputs.upstream_short }}
          labels: |
            org.opencontainers.image.source=https://github.com/ValorVie/osiris
            org.opencontainers.image.upstream=https://github.com/simplifaisoul/osiris
            org.opencontainers.image.revision=${{ steps.sync.outputs.upstream_sha }}
